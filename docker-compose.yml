services:
  codebase-mcp:
    build: .
    ports:
      - "8080:8080"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      # Persistent storage for vector DB, cloned repos, and hash cache
      - mcp-data:/data
      # Mount your config (edit this to point to your repos)
      - ./config.yaml:/app/config.yaml:ro
      # If you have local repos you want to index, mount them:
      # - /path/to/your/repos:/repos:ro

      # --- Git credentials for private repos (pick one) ---
      # Option 1: HTTPS credentials file (create .git-credentials with: https://USER:TOKEN@github.com)
      # - ./.git-credentials:/root/.git-credentials:ro
      # Option 2: SSH keys
      # - ~/.ssh:/root/.ssh:ro
    environment:
      - PYTHONUNBUFFERED=1
      # Prevent git from prompting for credentials (fail fast instead)
      - GIT_TERMINAL_PROMPT=0
      # HuggingFace token for model downloads (get from https://huggingface.co/settings/tokens)
      # - HF_TOKEN=hf_xxxxxxxxxxxx
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/mcp')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

volumes:
  mcp-data:
